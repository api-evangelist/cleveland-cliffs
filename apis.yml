description: >-
  Cleveland-Cliffs is North America's largest flat-rolled steel producer and
  supplier of iron ore pellets, operating an integrated business spanning
  mining, steelmaking, and downstream finishing for the automotive,
  infrastructure, and manufacturing markets. Cleveland-Cliffs does not
  publish a public developer portal or general-purpose REST API surface.
  Programmatic interaction with the company is limited to investor and
  customer touchpoints (corporate website, investor relations, customer
  service, EDI for trading partners).
